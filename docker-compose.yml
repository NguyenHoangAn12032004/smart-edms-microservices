services:
  postgres:
    image: postgres:15-alpine
    container_name: smartedms-postgres
    restart: always # <--- Thêm cái này để tự khởi động lại
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartedms} # Tên DB
      POSTGRES_USER: ${POSTGRES_USER:-postgres} # Dùng user root 'postgres' mặc định
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartedms123} # Mật khẩu cho user postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartedms-network

  minio:
    image: minio/minio:latest
    container_name: smartedms-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000" # Cổng API (Java gọi vào đây)
      - "9001:9001" # Cổng Web Console (Bạn vào xem file)
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - smartedms-network

volumes:
  postgres_data:
  minio_data:

networks:
  smartedms-network:
    driver: bridge
